<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuestroCine - Cartelera</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header id="home">
        <nav>
            <ul>
                <li><a class="nuestro" href="#home">NuestroCine</a></li>
                <li><a href="#cartelera">Cartelera</a></li>
                <li><a href="#pronto">Próximamente</a></li>
                <li><a href="#comida">Comida</a></li>
            </ul>
        </nav>
    </header>

    <!-- CARTELERA -->
    <section id="cartelera">
        <h1>EN CARTELERA</h1>
        <div class="filtros" id="filtros"></div>
        <div class="container" id="peliculas-container"></div>
    </section>

    <!-- PRÓXIMAMENTE -->
    <section id="pronto">
        <h1>PRÓXIMAMENTE</h1>
        <div class="container" id="pronto-container"></div>
    </section>

    <!-- COMIDA -->
    <section id="comida">
        <h1>COMIDA &amp; BEBIDAS</h1>
        <div id="menu-container"></div>
    </section>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal" style="display:none;">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <footer class="footer">
        <ul class="pie_pagina">
            <li><a href="#informacion">Información legal</a></li>
            <li><a href="#acerca">Acerca de nosotros</a></li>
            <li><a href="#contactanos">Contáctanos</a></li>
        </ul>
        <p class="footer-copy">&copy; 2024 NuestroCine. Todos los derechos reservados.</p>
    </footer>

    <script src="peliculas.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>

</body>

</html>
